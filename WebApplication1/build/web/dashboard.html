<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="UTF-8">
<title>Gestión de Espacios - UNA</title>

<script src="https://cdn.tailwindcss.com?plugins=forms"></script>

<link href="https://fonts.googleapis.com/css2?family=Newsreader&family=Public+Sans&display=swap" rel="stylesheet"/>

<style>
body { font-family: 'Public Sans', sans-serif; }
.font-headline { font-family: 'Newsreader', serif; }

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  gap: 6px;
}

.dia {
  padding: 12px;
  border-radius: 6px;
  text-align: center;
  cursor: pointer;
  background: #f6f3f2;
}

.dia:hover { background: #eae7e7; }

.selected-day {
  background: #9e0000 !important;
  color: white;
}
</style>

</head>

<body class="bg-[#fcf9f8] flex">

<aside class="w-72 h-screen bg-[#f6f3f2] flex flex-col p-6">
<h2 class="text-2xl font-headline text-red-700 font-bold mb-6">Gestión de Espacios</h2>
<nav class="flex flex-col gap-3 text-sm">
<a class="text-red-700 font-bold">Reservaciones</a>
</nav>
<div class="mt-auto">
<a href="logout" class="text-red-700 font-bold">Cerrar sesión</a>
</div>
</aside>

<main class="flex-1 p-8">

<div class="flex justify-between mb-8">
<h1 class="text-3xl font-headline text-red-700">Universidad Nacional</h1>
<span id="usuario"></span>
</div>

<div id="mensaje" class="mb-6 font-bold"></div>

<div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

<div class="lg:col-span-8 bg-white p-6 rounded-xl shadow">

<div class="flex justify-between mb-4">
<button onclick="cambiarMes(-1)">⬅</button>
<h2 id="mesActual"></h2>
<button onclick="cambiarMes(1)">➡</button>
</div>

<div class="calendar-grid font-bold mb-2 text-center">
<div>Dom</div><div>Lun</div><div>Mar</div><div>Mié</div>
<div>Jue</div><div>Vie</div><div>Sáb</div>
</div>

<div id="calendario" class="calendar-grid"></div>

</div>

<div class="lg:col-span-4 bg-white p-6 rounded-xl shadow">

<form action="reservar" method="POST" onsubmit="return validarForm()">

<input type="hidden" name="fecha" id="fecha">

<!-- 🔥 NUEVO LABEL -->
<label class="block text-sm font-bold mb-1">Hora inicio</label>
<input type="time" name="hora_inicio" class="w-full border p-3 mb-3" required>

<!-- 🔥 NUEVO LABEL -->
<label class="block text-sm font-bold mb-1">Hora fin</label>
<input type="time" name="hora_fin" class="w-full border p-3 mb-3" required>

<label class="block text-sm font-bold mb-1">Cantidad</label>
<input type="number" name="cantidad" class="w-full border p-3 mb-3" required>

<button class="w-full bg-red-700 text-white p-3">Reservar</button>

<p id="errorFecha" class="text-red-600 hidden">Seleccione fecha</p>

</form>

</div>

</div>

</main>

<script>

// 🔥 usuario seguro
fetch("usuarioActual")
.then(r=>r.text())
.then(u=>document.getElementById("usuario").innerText=u);

// 🔥 MENSAJES
const msg=new URLSearchParams(window.location.search).get("msg");
const mensaje=document.getElementById("mensaje");

if(msg==="ok")mensaje.innerHTML="<span class='text-green-600'>✔ Reserva creada</span>";
if(msg==="ocupado")mensaje.innerHTML="<span class='text-red-600'>❌ Horario ocupado</span>";
if(msg==="hora")mensaje.innerHTML="<span class='text-red-600'>❌ Hora inválida</span>";
if(msg==="cantidad")mensaje.innerHTML="<span class='text-red-600'>❌ Cantidad inválida</span>";
if(msg==="fecha")mensaje.innerHTML="<span class='text-red-600'>❌ Seleccione fecha</span>";
if(msg==="error")mensaje.innerHTML="<span class='text-red-600'>❌ Error</span>";
if(msg==="server")mensaje.innerHTML="<span class='text-red-600'>❌ Servidor no disponible</span>";

// VALIDAR
function validarForm(){
if(!fecha.value){
errorFecha.classList.remove("hidden");
return false;
}
return true;
}

// CALENDARIO
let mes=new Date().getMonth(),anio=new Date().getFullYear();

function generar(){
calendario.innerHTML="";
let first=new Date(anio,mes,1).getDay();
let total=new Date(anio,mes+1,0).getDate();

mesActual.innerText=new Date(anio,mes).toLocaleDateString("es",{month:"long",year:"numeric"});

for(let i=0;i<first;i++)calendario.innerHTML+="<div></div>";

for(let d=1;d<=total;d++){
calendario.innerHTML+=`<div class="dia">${d}</div>`;
}

document.querySelectorAll(".dia").forEach(d=>{
d.onclick=()=>{
document.querySelectorAll(".dia").forEach(x=>x.classList.remove("selected-day"));
d.classList.add("selected-day");

fecha.value=anio+"-"+String(mes+1).padStart(2,"0")+"-"+String(d.innerText).padStart(2,"0");
};
});
}

function cambiarMes(v){
mes+=v;
if(mes<0){mes=11;anio--;}
if(mes>11){mes=0;anio++;}
generar();
}

generar();

</script>

</body>
</html>
