<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login UNA</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Newsreader&family=Public+Sans&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#CC0000",
        "primary-dark": "#A30000",
        outline: "#C4C7C8"
      },
      fontFamily: {
        headline: ["Newsreader", "serif"],
        body: ["Public Sans", "sans-serif"],
      },
    },
  },
};
</script>

<style>
body { font-family: 'Public Sans', sans-serif; }
h1 { font-family: 'Newsreader', serif; }
</style>

</head>

<body class="bg-white min-h-screen flex flex-col">

<main class="flex-grow flex items-center justify-center px-4 py-12">

<div class="w-full max-w-md bg-white border border-outline shadow-xl rounded-lg">

<div class="p-10">

<div class="text-center mb-10">
<h1 class="text-4xl font-bold text-primary">UNA</h1>
<p class="text-gray-600 mt-2">Identificación Institucional</p>
</div>

<form action="login" method="POST" class="space-y-6">

<div id="errorBox" class="hidden bg-red-100 text-red-700 p-3 rounded text-sm text-center">
Error en el login
</div>

<div>
<label class="text-xs font-bold uppercase tracking-widest text-gray-500">
Correo institucional
</label>

<div class="relative mt-2">
<span class="material-symbols-outlined absolute left-3 top-3 text-gray-400">
person
</span>

<input 
name="email"
type="email"
placeholder="usuario@una.ac.cr"
class="w-full pl-10 pr-4 py-3 border border-outline focus:border-primary focus:ring-1 focus:ring-primary rounded outline-none transition"
required
autocomplete="email"
/>
</div>
</div>

<div>
<label class="text-xs font-bold uppercase tracking-widest text-gray-500">
Contraseña
</label>

<div class="relative mt-2">
<span class="material-symbols-outlined absolute left-3 top-3 text-gray-400">
lock
</span>

<input 
name="password"
type="password"
placeholder="••••••••"
class="w-full pl-10 pr-4 py-3 border border-outline focus:border-primary focus:ring-1 focus:ring-primary rounded outline-none transition"
required
autocomplete="current-password"
/>
</div>
</div>

<button 
class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-4 rounded shadow-md hover:shadow-lg transition-all uppercase tracking-widest text-sm"
>
Ingresar
</button>

</form>

</div>
</div>

</main>

<footer class="w-full border-t p-6 text-center text-xs text-gray-500">
© 2026 Universidad Nacional
</footer>

<script>
const params = new URLSearchParams(window.location.search);
const errorBox = document.getElementById("errorBox");

function mostrarError(msg){
  errorBox.innerText = msg;
  errorBox.classList.remove("hidden");
}

if (params.get("error") === "email") {
  mostrarError("Solo correos @una.ac.cr ❌");
}

if (params.get("error") === "login") {
  mostrarError("Usuario o contraseña incorrectos ❌");
}

if (params.get("error") === "server") {
  mostrarError("Servidor no disponible ❌");
}
</script>

</body>
</html>
