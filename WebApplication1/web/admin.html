<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin Reservas</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

  <header class="bg-red-800 text-white p-4 flex justify-between">
    <h1 class="font-bold text-xl">Panel Administrador</h1>
    <div>
      Admin: <span id="user"></span>
      <a href="logout" class="ml-4 bg-white text-red-800 px-3 py-1 rounded">Salir</a>
    </div>
  </header>

  <div class="p-6">

    <h2 class="text-xl font-bold mb-4">Reservas Registradas</h2>

    <button onclick="window.location.href='limpiarTTL'"
      class="bg-black text-white px-4 py-2 mb-4 rounded">
      Limpiar expiradas
    </button>

    <div id="mensaje" class="mb-4 font-bold"></div>

    <table class="w-full bg-white shadow text-center rounded overflow-hidden">
      <thead class="bg-gray-200">
        <tr>
          <th class="p-2">ID</th>
          <th class="p-2">Fecha</th>
          <th class="p-2">Hora</th>
          <th class="p-2">Asistentes</th>
          <th class="p-2">Estado</th>
          <th class="p-2">Usuario</th>
          <th class="p-2">Equipamiento</th>
          <th class="p-2">Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>

    <h3 class="text-lg font-bold mt-6">Crear / Editar Reserva</h3>

    <form id="formReserva" action="ReservationServlet" method="POST"
      class="bg-white p-4 rounded shadow mt-2" onsubmit="return validarAdminForm()">

      <input type="hidden" id="idReserva" name="id">

      <label class="font-bold">Fecha</label>
      <input type="date" name="date" id="fechaInput"
        class="w-full border p-2 mb-2 rounded" required>

      <label class="font-bold">Hora inicio</label>
      <input type="time" name="start_time" id="horaInicioInput"
        class="w-full border p-2 mb-2 rounded" required>

      <label class="font-bold">Hora fin</label>
      <input type="time" name="end_time" id="horaFinInput"
        class="w-full border p-2 mb-2 rounded" required>

      <label class="font-bold">Cantidad</label>
      <input type="number" name="quantity" id="cantidadInput"
        class="w-full border p-2 mb-2 rounded" required min="1" max="200">

      <label class="font-bold">Estado</label>
      <select name="status" id="estadoInput" class="w-full border p-2 mb-2 rounded">
        <option value="PENDING">PENDIENTE</option>
        <option value="CONFIRMED">CONFIRMADA</option>
        <option value="EXPIRED">EXPIRADA</option>
      </select>

      <button id="btnGuardar"
        class="bg-red-700 text-white px-4 py-2 rounded">
        Crear
      </button>

      <button type="button" onclick="cancelarEdicion()"
        id="btnCancelar"
        class="bg-gray-500 text-white px-4 py-2 rounded ml-2 hidden">
        Cancelar
      </button>

    </form>

  </div>

  <div id="modalEquipos" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white p-6 rounded-lg w-full max-w-md">
      <h3 class="font-bold text-lg mb-4">Editar Equipamiento</h3>
      <div id="listaEquiposModal" class="space-y-3 mb-4 max-h-60 overflow-y-auto"></div>
      <div class="flex justify-end gap-2">
        <button type="button" onclick="cerrarModalEquipos()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">Cerrar</button>
      </div>
    </div>
  </div>

  <script>
    fetch("role")
      .then(res => res.text())
      .then(role => {
        if (role.trim() !== "ADMIN") {
          window.location.href = "index.html";
        }
      });

    fetch("currentUser")
      .then(res => res.text())
      .then(user => {
        document.getElementById("user").innerText = user;
      })
      .catch(() => {
        document.getElementById("user").innerText = "Admin";
      });

    const params = new URLSearchParams(window.location.search);
    const msg = params.get("msg");
    const mensaje = document.getElementById("mensaje");

    const mensajes = {
      "ok": "<div class='text-green-600'>✔ Operación exitosa</div>",
      "busy": "<div class='text-red-600'>❌ Horario ocupado</div>",
      "hour": "<div class='text-red-600'>❌ Hora inválida</div>",
      "quantity": "<div class='text-red-600'>❌ Cantidad inválida</div>",
      "past": "<div class='text-red-600'>❌ No se permiten fechas pasadas</div>",
      "ttl": "<div class='text-blue-600'>🧹 TTL ejecutado</div>",
      "confirmed": "<div class='text-green-600'>✔ Confirmada</div>",
      "equipment_updated": "<div class='text-green-600'>✔ Equipamiento actualizado</div>",
      "equipment_deleted": "<div class='text-green-600'>✔ Equipamiento eliminado</div>",
      "error": "<div class='text-red-600'>❌ Error</div>",
      "server": "<div class='text-red-600'>❌ Servidor no disponible</div>",
      "unauthorized": "<div class='text-red-600'>❌ No autorizado</div>"
    };

    if (msg && mensajes[msg]) {
      mensaje.innerHTML = mensajes[msg];
      history.replaceState(null, null, window.location.pathname);
    }

    const EQUIPMENT_NAMES = {
      '1': 'Proyector',
      '2': 'Micrófono', 
      '3': 'Sonido'
    };

    function getEquipmentName(id) {
      return EQUIPMENT_NAMES[id] || 'Equipo #' + id;
    }

    function parseEquipments(equipStr) {
      if (!equipStr || equipStr.trim() === "") return [];
      return equipStr.split(',').map(part => {
        const [id, qty] = part.split(':');
        return { id: id.trim(), qty: parseInt(qty.trim()) };
      });
    }

    function renderEquipmentBadges(equipments, reservationId) {
      if (!equipments || equipments.length === 0) {
        return '<span class="text-gray-400 text-xs">-</span>';
      }
      
      return equipments.map(eq => `
        <span class="inline-flex items-center bg-gray-100 px-2 py-1 rounded text-xs mr-1 mb-1">
          ${getEquipmentName(eq.id)} ×${eq.qty}
          <button type="button" onclick="eliminarEquipamento(${reservationId}, ${eq.id})" 
            class="ml-1 text-red-500 hover:text-red-700 font-bold" title="Eliminar">✕</button>
        </span>
      `).join('');
    }

    function cargarReservas() {
      fetch("listReservations")
        .then(res => res.text())
        .then(data => {
          let html = "";

          if (!data || data.trim() === "") {
            document.getElementById("tabla").innerHTML = "<tr><td colspan='8' class='p-4 text-gray-500'>No hay reservas</td></tr>";
            return;
          }

          if (data.startsWith("ERROR")) {
            mensaje.innerHTML = "<div class='text-red-600'>❌ " + data + "</div>";
            document.getElementById("tabla").innerHTML = "";
            return;
          }

          const reservas = data.split("|").filter(r => r.trim());

          reservas.forEach(r => {
            const p = r.split(",");
            const equipments = parseEquipments(p[7] || "");
            const equipHtml = renderEquipmentBadges(equipments, p[0]);

            html += `
              <tr class="border-b hover:bg-gray-50">
                <td class="p-2 font-mono text-sm">${p[0]}</td>
                <td class="p-2">${p[1]}</td>
                <td class="p-2 text-sm">${p[2]}-${p[3]}</td>
                <td class="p-2">${p[4]}</td>
                <td class="p-2">
                  <span class="px-2 py-1 rounded text-xs font-bold ${colorEstado(p[5])}">
                    ${p[5]}
                  </span>
                </td>
                <td class="p-2 text-sm">${p[6]}</td>
                <td class="p-2 text-left">${equipHtml}</td>
                <td class="p-2">
                  ${p[5] === "PENDING" ? `
                    <button type="button" onclick="window.location.href='confirmReservation?id=${p[0]}'"
                      class="bg-green-600 text-white px-2 py-1 rounded text-xs hover:bg-green-700" title="Confirmar">✔</button>
                  ` : ''}
                  
                  ${(p[5] === "PENDING" || p[5] === "CONFIRMED") ? `
                    <button type="button" onclick="editar(${p[0]}, '${p[1]}', '${p[2]}', '${p[3]}', ${p[4]}, '${p[5]}')"
                      class="bg-yellow-500 text-white px-2 py-1 rounded text-xs hover:bg-yellow-600 ml-1" title="Editar">✎</button>
                  ` : ''}
                  
                  <button type="button" onclick="eliminar(${p[0]})"
                    class="bg-red-600 text-white px-2 py-1 rounded text-xs hover:bg-red-700 ml-1" title="Eliminar">✕</button>
                    
                  ${equipments.length > 0 ? `
                    <button type="button" onclick="verEquipos(${p[0]}, '${p[7] || ''}')"
                      class="bg-blue-500 text-white px-2 py-1 rounded text-xs hover:bg-blue-600 ml-1" title="Ver equipos">🔧</button>
                  ` : ''}
                </td>
              </tr>
            `;
          });

          document.getElementById("tabla").innerHTML = html;
        })
        .catch(err => {
          console.error(err);
          mensaje.innerHTML = "<div class='text-red-600'>❌ Error cargando reservas</div>";
        });
    }

    function colorEstado(e) {
      if (e === "CONFIRMED") return "bg-green-100 text-green-700";
      if (e === "PENDING") return "bg-yellow-100 text-yellow-700";
      if (e === "EXPIRED") return "bg-gray-100 text-gray-500";
      return "bg-gray-100";
    }

    function editar(id, fecha, inicio, fin, cantidad, estado) {
      document.getElementById("idReserva").value = id;
      document.getElementById("fechaInput").value = fecha;
      document.getElementById("horaInicioInput").value = inicio;
      document.getElementById("horaFinInput").value = fin;
      document.getElementById("cantidadInput").value = cantidad;
      document.getElementById("estadoInput").value = estado;

      document.getElementById("formReserva").action = "editReservation";
      document.getElementById("btnGuardar").innerText = "Actualizar";
      document.getElementById("btnGuardar").classList.replace("bg-red-700", "bg-green-600");
      document.getElementById("btnCancelar").classList.remove("hidden");
    }

    function cancelarEdicion() {
      document.getElementById("formReserva").reset();
      document.getElementById("idReserva").value = "";
      document.getElementById("estadoInput").value = "PENDING";
      document.getElementById("formReserva").action = "ReservationServlet";
      document.getElementById("btnGuardar").innerText = "Crear";
      document.getElementById("btnGuardar").classList.replace("bg-green-600", "bg-red-700");
      document.getElementById("btnCancelar").classList.add("hidden");
    }

    function eliminar(id) {
      if (!confirm("¿Eliminar esta reserva?")) return;
      fetch("deleteReservation?id=" + id)
        .then(() => {
          mensaje.innerHTML = "<div class='text-green-600'>✔ Reserva eliminada</div>";
          cargarReservas();
        })
        .catch(() => {
          mensaje.innerHTML = "<div class='text-red-600'>❌ Error al eliminar</div>";
        });
    }

    function verEquipos(reservationId, equipStr) {
      const equipments = parseEquipments(equipStr);
      const container = document.getElementById("listaEquiposModal");
      
      if (equipments.length === 0) {
        container.innerHTML = "<p class='text-gray-500 text-sm'>Sin equipamiento</p>";
      } else {
        container.innerHTML = equipments.map(eq => `
          <div class="flex items-center justify-between bg-gray-50 p-3 rounded">
            <div>
              <span class="font-bold">${getEquipmentName(eq.id)}</span>
              <span class="text-gray-500 text-sm ml-2">Cantidad: ${eq.qty}</span>
            </div>
            <div class="flex items-center gap-2">
              <input type="number" id="eq-qty-${eq.id}" value="${eq.qty}" 
                class="w-16 border rounded px-2 py-1 text-sm" min="1" max="10">
              <button type="button" onclick="actualizarEquipamento(${reservationId}, ${eq.id})"
                class="bg-blue-600 text-white px-3 py-1 rounded text-xs hover:bg-blue-700">
                Actualizar
              </button>
              <button type="button" onclick="eliminarEquipamento(${reservationId}, ${eq.id})"
                class="bg-red-600 text-white px-3 py-1 rounded text-xs hover:bg-red-700">
                Eliminar
              </button>
            </div>
          </div>
        `).join('');
      }
      
      document.getElementById("modalEquipos").classList.remove("hidden");
    }

    function cerrarModalEquipos() {
      document.getElementById("modalEquipos").classList.add("hidden");
      cargarReservas(); 
    }

    function actualizarEquipamento(reservationId, equipmentId) {
      const newQty = document.getElementById(`eq-qty-${equipmentId}`).value;
      if (newQty < 1) {
        alert("La cantidad debe ser al menos 1");
        return;
      }
      
      const form = document.createElement("form");
      form.method = "POST";
      form.action = "admin/equipment";
      form.innerHTML = `
        <input type="hidden" name="action" value="update">
        <input type="hidden" name="reservation_id" value="${reservationId}">
        <input type="hidden" name="equipment_id" value="${equipmentId}">
        <input type="hidden" name="quantity" value="${newQty}">
      `;
      document.body.appendChild(form);
      form.submit();
    }

    function eliminarEquipamento(reservationId, equipmentId) {
      if (!confirm("¿Eliminar este equipamiento de la reserva?")) return;
      
      const form = document.createElement("form");
      form.method = "POST";
      form.action = "admin/equipment";
      form.innerHTML = `
        <input type="hidden" name="action" value="delete">
        <input type="hidden" name="reservation_id" value="${reservationId}">
        <input type="hidden" name="equipment_id" value="${equipmentId}">
      `;
      document.body.appendChild(form);
      form.submit();
    }

    function validarAdminForm() {
      const fechaInput = document.getElementById("fechaInput").value;
      if (!fechaInput) return false;

      const hoy = new Date();
      hoy.setHours(0, 0, 0, 0);
      const fechaSeleccionada = new Date(fechaInput + "T00:00:00");
      
      if (fechaSeleccionada < hoy) {
        mensaje.innerHTML = "<div class='text-red-600'>❌ No se permiten fechas pasadas</div>";
        return false;
      }

      const inicio = document.getElementById("horaInicioInput").value;
      const fin = document.getElementById("horaFinInput").value;
      if (inicio >= fin) {
        mensaje.innerHTML = "<div class='text-red-600'>❌ Hora inválida</div>";
        return false;
      }

      const cantidad = parseInt(document.getElementById("cantidadInput").value);
      if (cantidad <= 0 || cantidad > 200) {
        mensaje.innerHTML = "<div class='text-red-600'>❌ Cantidad inválida</div>";
        return false;
      }

      return true;
    }

    window.onload = cargarReservas;

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') cerrarModalEquipos();
    });
  </script>

</body>
</html>
