<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login UNA</title>

<script>
if (window.location.protocol === "file:") {
  window.location.href = "http://localhost:8080/AuditorioUNA/index.html";
}
</script>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Newsreader&family=Public+Sans&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
/**
 * Tailwind CSS custom configuration.
 *
 * <p>Defines the institutional color palette and font families used by the
 * login page. The primary color represents the UNA visual identity.
 */
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#CC0000",
        "primary-dark": "#A30000",
        outline: "#C4C7C8"
      },
      fontFamily: {
        headline: ["Newsreader", "serif"],
        body: ["Public Sans", "sans-serif"],
      },
    },
  },
};
</script>

<style>
body { font-family: 'Public Sans', sans-serif; }
h1 { font-family: 'Newsreader', serif; }

.una-logo {
  display: block;
  width: min(100%, 340px);
  height: auto;
  margin: 0 auto;
}

.field-help {
  min-height: 18px;
}

.toggle-password {
  align-items: center;
  color: #6b7280;
  display: flex;
  height: 100%;
  justify-content: center;
  position: absolute;
  right: 10px;
  top: 0;
  transition: color 0.15s ease;
  width: 34px;
}

.toggle-password:hover {
  color: #CC0000;
}
</style>

</head>

<body class="bg-white min-h-screen flex flex-col">

<!--
  Login Page

  This page is the main access point of the auditorium reservation system.
  It allows registered users to authenticate using their institutional email
  and password.

  Main features:
  - Receives email and password credentials.
  - Sends login data to the /login servlet using POST.
  - Displays authentication error messages returned by the backend.
  - Displays a success message after successful registration.
  - Provides access to register.html for users who do not have an account.

  Backend endpoint used:
  - /login
-->

<main class="flex-grow flex items-center justify-center px-4 py-12">

<div class="w-full max-w-md bg-white border border-outline shadow-xl rounded-lg">

<div class="p-10">

<div class="text-center mb-10">
<img src="assets/una-logo.png" alt="Universidad Nacional Costa Rica" class="una-logo"/>
<p class="text-gray-600 mt-2">Identificación Institucional</p>
</div>

<form id="loginForm" action="login" method="POST" class="space-y-6" novalidate>

<div id="errorBox" class="hidden bg-red-100 text-red-700 p-3 rounded text-sm text-center">
Error en el login
</div>

<div>
<label class="text-xs font-bold uppercase tracking-widest text-gray-500">
Correo institucional
</label>

<div class="relative mt-2">
<span class="material-symbols-outlined absolute left-3 top-3 text-gray-400">
person
</span>

<input 
id="email"
name="email"
type="email"
placeholder="usuario@una.ac.cr"
class="w-full pl-10 pr-4 py-3 border border-outline focus:border-primary focus:ring-1 focus:ring-primary rounded outline-none transition"
required
autocomplete="email"
/>
</div>
<p id="emailHelp" class="field-help mt-1 text-xs text-gray-500">Use su correo institucional @una.ac.cr</p>
</div>

<div>
<label class="text-xs font-bold uppercase tracking-widest text-gray-500">
Contraseña
</label>

<div class="relative mt-2">
<span class="material-symbols-outlined absolute left-3 top-3 text-gray-400">
lock
</span>

<input 
id="password"
name="password"
type="password"
placeholder="••••••••"
class="w-full pl-10 pr-12 py-3 border border-outline focus:border-primary focus:ring-1 focus:ring-primary rounded outline-none transition"
required
autocomplete="current-password"
/>
<button type="button" class="toggle-password" data-target="password" aria-label="Mostrar contrasena">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
<p id="passwordHelp" class="field-help mt-1 text-xs text-gray-500">Ingrese su contrasena</p>
</div>

<label class="flex items-center gap-2 text-sm text-gray-600">
<input id="rememberEmail" type="checkbox" class="rounded border-outline text-primary focus:ring-primary"/>
Recordar correo
</label>

<button 
id="submitBtn"
type="submit"
class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-4 rounded shadow-md hover:shadow-lg transition-all uppercase tracking-widest text-sm"
>
Ingresar
</button>

<div class="text-center pt-2">
  <p class="text-sm text-gray-600">
    ¿No tienes cuenta?
  </p>

  <a href="register.html"
     class="inline-block mt-2 border border-primary text-primary hover:bg-red-50 font-bold px-4 py-2 rounded transition">
    Crear cuenta nueva
  </a>
</div>

</form>

</div>
</div>

</main>

<footer class="w-full border-t p-6 text-center text-xs text-gray-500">
© 2026 Universidad Nacional
</footer>

<script>
/**
 * @fileoverview Login page message handler.
 *
 * <p>This script reads query parameters returned by the backend after login
 * or registration attempts. It displays user-friendly messages and removes
 * the query string from the URL after processing it.
 */

/**
 * Query parameters received in the current page URL.
 *
 * <p>These parameters are used to detect authentication errors or successful
 * registration events.
 *
 * @type {URLSearchParams}
 */
const params = new URLSearchParams(window.location.search);

/**
 * DOM element used to display login errors or registration success messages.
 *
 * @type {HTMLElement}
 */
const errorBox = document.getElementById("errorBox");
const form = document.getElementById("loginForm");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const submitBtn = document.getElementById("submitBtn");
const rememberEmail = document.getElementById("rememberEmail");
const emailHelp = document.getElementById("emailHelp");
const passwordHelp = document.getElementById("passwordHelp");

function setFieldState(input, help, valid, message, neutral) {
  help.innerText = message;
  input.classList.remove("border-red-400", "border-green-500", "focus:border-red-500", "focus:ring-red-100");
  help.classList.remove("text-red-600", "text-green-700", "text-gray-500");

  if (neutral) {
    help.classList.add("text-gray-500");
    return;
  }

  input.classList.add(valid ? "border-green-500" : "border-red-400");
  if (!valid) {
    input.classList.add("focus:border-red-500", "focus:ring-red-100");
  }
  help.classList.add(valid ? "text-green-700" : "text-red-600");
}

function validateEmail(showNeutral) {
  const email = emailInput.value.trim().toLowerCase();
  if (!email) {
    setFieldState(emailInput, emailHelp, false, "Use su correo institucional @una.ac.cr", showNeutral);
    return false;
  }

  const valid = /^[^\s@]+@una\.ac\.cr$/.test(email);
  setFieldState(emailInput, emailHelp, valid, valid ? "Correo institucional valido" : "Use un correo @una.ac.cr", false);
  return valid;
}

function validatePassword(showNeutral) {
  const valid = passwordInput.value.length > 0;
  setFieldState(passwordInput, passwordHelp, valid, valid ? "Contrasena ingresada" : "Ingrese su contrasena", showNeutral);
  return valid;
}

function validateForm(showNeutral) {
  const emailOk = validateEmail(showNeutral);
  const passwordOk = validatePassword(showNeutral);
  return emailOk && passwordOk;
}

const savedEmail = localStorage.getItem("auditorioUnaEmail");
if (savedEmail) {
  emailInput.value = savedEmail;
  rememberEmail.checked = true;
  validateEmail(false);
}

emailInput.addEventListener("input", () => validateEmail(false));
passwordInput.addEventListener("input", () => validatePassword(false));

document.querySelectorAll(".toggle-password").forEach((button) => {
  button.addEventListener("click", () => {
    const input = document.getElementById(button.dataset.target);
    const icon = button.querySelector(".material-symbols-outlined");
    const isHidden = input.type === "password";
    input.type = isHidden ? "text" : "password";
    icon.innerText = isHidden ? "visibility_off" : "visibility";
  });
});

form.addEventListener("submit", (event) => {
  if (!validateForm(false)) {
    event.preventDefault();
    mostrarError("Revise los campos marcados antes de ingresar");
    return;
  }

  if (rememberEmail.checked) {
    localStorage.setItem("auditorioUnaEmail", emailInput.value.trim());
  } else {
    localStorage.removeItem("auditorioUnaEmail");
  }

  submitBtn.disabled = true;
  submitBtn.innerText = "Ingresando...";
  submitBtn.classList.add("opacity-80", "cursor-wait");
});

/**
 * Displays an error message in the login page.
 *
 * <p>The message box is styled with red colors to indicate that the operation
 * failed. This function is used for invalid email, invalid login, unregistered
 * users and server errors.
 *
 * @param {string} msg message to display to the user
 * @returns {void}
 */
function mostrarError(msg){
  errorBox.innerText = msg;
  errorBox.classList.remove("hidden");
  errorBox.classList.remove("bg-green-100", "text-green-700");
  errorBox.classList.add("bg-red-100", "text-red-700");
}

/**
 * Displays a success message in the login page.
 *
 * <p>The message box is styled with green colors to indicate that the account
 * was created successfully and the user may now log in.
 *
 * @param {string} msg message to display to the user
 * @returns {void}
 */
function mostrarExito(msg){
  errorBox.innerText = msg;
  errorBox.classList.remove("hidden");
  errorBox.classList.remove("bg-red-100", "text-red-700");
  errorBox.classList.add("bg-green-100", "text-green-700");
}

/**
 * Displays an error when the submitted email is empty or does not belong to
 * the institutional domain.
 */
if (params.get("error") === "email") {
  mostrarError("Solo correos @una.ac.cr ❌");
}

/**
 * Displays an error when the email/password combination is invalid.
 */
if (params.get("error") === "login") {
  mostrarError("Usuario o contraseña incorrectos ❌");
}

/**
 * Displays an error when the email is not registered in the database.
 */
if (params.get("error") === "not_registered") {
  mostrarError("Este correo no está registrado. Debe crear una cuenta ❌");
}

/**
 * Displays an error when the backend server is not available.
 */
if (params.get("error") === "server") {
  mostrarError("Servidor no disponible ❌");
}

/**
 * Displays a success message after a user account is created successfully.
 */
if (params.get("registered") === "ok") {
  mostrarExito("Cuenta creada correctamente. Ahora inicia sesión ✅");
}

/**
 * Removes query parameters from the browser URL after displaying the message.
 *
 * <p>This avoids showing the same message again if the user refreshes the page.
 */
if (params.toString()) {
  history.replaceState(null, null, window.location.pathname);
}
</script>

</body>
</html>
