<!DOCTYPE html>
<html class="light" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Perfil - UNA</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader&family=Public+Sans&display=swap" rel="stylesheet"/>

  <style>
    body { font-family: 'Public Sans', sans-serif; }
    .font-headline { font-family: 'Newsreader', serif; }

    .badge-pending   { background:#fef3c7; color:#92400e; }
    .badge-confirmed { background:#d1fae5; color:#065f46; }
    .badge-expired   { background:#f3f4f6; color:#6b7280; }
  </style>
</head>

<body class="bg-[#fcf9f8] flex">

  <!--
    User Profile Page

    Displays the authenticated CLIENT user's profile and all their
    reservations. The user can cancel PENDING or CONFIRMED reservations
    directly from this page.

    Backend endpoints used:
    - /currentUser      (GET)  — fetch logged-in email
    - /myReservations   (GET)  — fetch user's reservations
    - /cancelReservation?id=N  (GET) — cancel a reservation
    - /logout           (GET)  — log out
  -->

  <!-- ── Sidebar ── -->
  <aside class="w-72 h-screen bg-[#f6f3f2] flex flex-col p-6 sticky top-0">
    <h2 class="text-2xl font-headline text-red-700 font-bold mb-6">Gestión de Espacios</h2>

    <nav class="flex flex-col gap-3 text-sm">
      <a href="dashboard.html" class="text-gray-600 hover:text-red-700">Reservaciones</a>
      <a href="profile.html"   class="text-red-700 font-bold">Mi Perfil</a>
    </nav>

    <div class="mt-auto">
      <a href="logout" class="text-red-700 font-bold">Cerrar sesión</a>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="flex-1 p-8 overflow-y-auto">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-headline text-red-700">Universidad Nacional</h1>
      <span id="usuarioHeader" class="text-gray-600 text-sm"></span>
    </div>

    <!-- Profile card -->
    <div class="bg-white rounded-xl shadow p-6 mb-8 flex items-center gap-6">
      <div class="w-16 h-16 rounded-full bg-red-700 flex items-center justify-center text-white text-2xl font-bold select-none"
           id="avatarLetra">?</div>
      <div>
        <p class="text-lg font-bold text-gray-800" id="perfilEmail">—</p>
        <p class="text-sm text-gray-500">Cliente · UNA</p>
      </div>
    </div>

    <!-- Feedback message -->
    <div id="mensaje" class="mb-6 font-bold min-h-[24px]"></div>

    <!-- Reservations section -->
    <div class="bg-white rounded-xl shadow p-6">

      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-headline text-gray-800">Mis Reservaciones</h2>
        <button onclick="cargarReservas()"
                class="text-sm text-red-700 hover:underline">↺ Actualizar</button>
      </div>

      <!-- Stats row -->
      <div class="grid grid-cols-3 gap-4 mb-6" id="statsRow">
        <div class="rounded-lg bg-yellow-50 border border-yellow-200 p-4 text-center">
          <p class="text-2xl font-bold text-yellow-700" id="cntPending">—</p>
          <p class="text-xs text-yellow-600 mt-1">Pendientes</p>
        </div>
        <div class="rounded-lg bg-green-50 border border-green-200 p-4 text-center">
          <p class="text-2xl font-bold text-green-700" id="cntConfirmed">—</p>
          <p class="text-xs text-green-600 mt-1">Confirmadas</p>
        </div>
        <div class="rounded-lg bg-gray-50 border border-gray-200 p-4 text-center">
          <p class="text-2xl font-bold text-gray-500" id="cntExpired">—</p>
          <p class="text-xs text-gray-400 mt-1">Expiradas</p>
        </div>
      </div>

      <!-- Filter tabs -->
      <div class="flex gap-2 mb-4 text-sm" id="filtros">
        <button onclick="filtrar('ALL')"       id="tab-ALL"       class="tab-btn px-3 py-1 rounded-full bg-red-700 text-white">Todas</button>
        <button onclick="filtrar('PENDING')"   id="tab-PENDING"   class="tab-btn px-3 py-1 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200">Pendientes</button>
        <button onclick="filtrar('CONFIRMED')" id="tab-CONFIRMED" class="tab-btn px-3 py-1 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200">Confirmadas</button>
        <button onclick="filtrar('EXPIRED')"   id="tab-EXPIRED"   class="tab-btn px-3 py-1 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200">Expiradas</button>
      </div>

      <!-- Table -->
      <div class="overflow-x-auto">
        <table class="w-full text-sm text-left">
          <thead class="bg-gray-50 text-gray-500 uppercase text-xs">
            <tr>
              <th class="px-4 py-3">#</th>
              <th class="px-4 py-3">Fecha</th>
              <th class="px-4 py-3">Hora</th>
              <th class="px-4 py-3">Asistentes</th>
              <th class="px-4 py-3">Equipo</th>
              <th class="px-4 py-3">Estado</th>
              <th class="px-4 py-3">Acción</th>
            </tr>
          </thead>
          <tbody id="tablaReservas" class="divide-y divide-gray-100">
            <tr>
              <td colspan="7" class="text-center py-8 text-gray-400">Cargando reservaciones…</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div><!-- /card -->
  </main>

  <script>
    /* ── State ── */
    const EQUIP_NAMES = { '1': 'Proyector', '2': 'Micrófono', '3': 'Sistema de sonido' };
    let todasLasReservas = [];
    let filtroActual = 'ALL';

    /* ── Helpers ── */
    function mostrarMensaje(texto, tipo) {
      const el = document.getElementById('mensaje');
      el.textContent = texto;
      el.className = 'mb-6 font-bold min-h-[24px] ' +
        (tipo === 'ok'    ? 'text-green-700' :
         tipo === 'error' ? 'text-red-700'   : 'text-gray-700');
      setTimeout(() => { el.textContent = ''; el.className = 'mb-6 font-bold min-h-[24px]'; }, 4000);
    }

    function badgeClass(status) {
      if (status === 'PENDING')   return 'badge-pending';
      if (status === 'CONFIRMED') return 'badge-confirmed';
      return 'badge-expired';
    }

    function badgeLabel(status) {
      if (status === 'PENDING')   return 'Pendiente';
      if (status === 'CONFIRMED') return 'Confirmada';
      if (status === 'EXPIRED')   return 'Expirada';
      return status;
    }

    function formatEquip(equipStr) {
      if (!equipStr) return '<span class="text-gray-400">—</span>';
      return equipStr.split(',').map(item => {
        const [id, qty] = item.split(':');
        const name = EQUIP_NAMES[id] || 'Equipo ' + id;
        return `<span class="inline-block bg-gray-100 rounded px-1 mr-1">${name} ×${qty}</span>`;
      }).join('');
    }

    /* ── Load user ── */
    async function cargarUsuario() {
      try {
        const res = await fetch('currentUser');
        const email = await res.text();
        if (!email || email === 'NO_SESSION') {
          window.location.href = 'index.html';
          return;
        }
        document.getElementById('perfilEmail').textContent   = email;
        document.getElementById('usuarioHeader').textContent = email;
        const letra = email.charAt(0).toUpperCase();
        document.getElementById('avatarLetra').textContent   = letra;
      } catch (e) {
        window.location.href = 'index.html';
      }
    }

    /* ── Load reservations ── */
    async function cargarReservas() {
      const tbody = document.getElementById('tablaReservas');
      tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-gray-400">Cargando…</td></tr>';

      try {
        const res = await fetch('myReservations');

        if (res.status === 401) { window.location.href = 'index.html'; return; }
        if (!res.ok) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-red-500">Error al conectar con el servidor.</td></tr>';
          return;
        }

        const texto = await res.text();
        todasLasReservas = parsearReservas(texto);
        actualizarStats();
        renderTabla();

      } catch (e) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-8 text-red-500">Error de red.</td></tr>';
      }
    }

    function parsearReservas(texto) {
      if (!texto || texto.startsWith('ERROR')) return [];
      return texto.split('|')
        .filter(r => r.trim())
        .map(r => {
          // format: id,date,startTime,endTime,quantity,status,equipment
          const parts = r.split(',');
          return {
            id:        parts[0] || '',
            date:      parts[1] || '',
            startTime: parts[2] || '',
            endTime:   parts[3] || '',
            quantity:  parts[4] || '',
            status:    parts[5] || '',
            equip:     parts.slice(6).join(',') // equipment may contain colons
          };
        });
    }

    function actualizarStats() {
      const cnt = { PENDING: 0, CONFIRMED: 0, EXPIRED: 0 };
      todasLasReservas.forEach(r => { if (cnt[r.status] !== undefined) cnt[r.status]++; });
      document.getElementById('cntPending').textContent   = cnt.PENDING;
      document.getElementById('cntConfirmed').textContent = cnt.CONFIRMED;
      document.getElementById('cntExpired').textContent   = cnt.EXPIRED;
    }

    function filtrar(estado) {
      filtroActual = estado;

      // Update tab styles
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.className = 'tab-btn px-3 py-1 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200';
      });
      const activeTab = document.getElementById('tab-' + estado);
      if (activeTab) activeTab.className = 'tab-btn px-3 py-1 rounded-full bg-red-700 text-white';

      renderTabla();
    }

    function renderTabla() {
      const tbody = document.getElementById('tablaReservas');
      const lista = filtroActual === 'ALL'
        ? todasLasReservas
        : todasLasReservas.filter(r => r.status === filtroActual);

      if (lista.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-10 text-gray-400">
          No hay reservaciones${filtroActual !== 'ALL' ? ' en este estado' : ''}.
        </td></tr>`;
        return;
      }

      tbody.innerHTML = lista.map(r => {
        const canCancel = r.status === 'PENDING' || r.status === 'CONFIRMED';
        const accionBtn = canCancel
          ? `<button onclick="cancelar(${r.id})"
               class="text-xs bg-red-100 text-red-700 hover:bg-red-200 px-3 py-1 rounded-full transition">
               Cancelar
             </button>`
          : `<span class="text-xs text-gray-400">—</span>`;

        return `
          <tr class="hover:bg-gray-50 transition">
            <td class="px-4 py-3 text-gray-500">#${r.id}</td>
            <td class="px-4 py-3 font-medium text-gray-800">${formatDate(r.date)}</td>
            <td class="px-4 py-3 text-gray-600">${r.startTime} – ${r.endTime}</td>
            <td class="px-4 py-3 text-gray-700">${r.quantity}</td>
            <td class="px-4 py-3">${formatEquip(r.equip)}</td>
            <td class="px-4 py-3">
              <span class="text-xs font-bold px-2 py-1 rounded-full ${badgeClass(r.status)}">
                ${badgeLabel(r.status)}
              </span>
            </td>
            <td class="px-4 py-3">${accionBtn}</td>
          </tr>`;
      }).join('');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '—';
      try {
        const [y, m, d] = dateStr.split('-');
        const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
        return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
      } catch (e) { return dateStr; }
    }

    /* ── Cancel ── */
    async function cancelar(id) {
      if (!confirm(`¿Deseas cancelar la reservación #${id}? Esta acción no se puede deshacer.`)) return;

      try {
        const res = await fetch(`cancelReservation?id=${id}`);
        const texto = await res.text();

        if (texto === 'ok') {
          mostrarMensaje(`Reservación #${id} cancelada exitosamente.`, 'ok');
          await cargarReservas();
        } else if (texto === 'not_found') {
          mostrarMensaje('No se encontró la reservación o no te pertenece.', 'error');
        } else if (texto === 'not_allowed') {
          mostrarMensaje('Esta reservación no puede ser cancelada (ya expiró).', 'error');
        } else {
          mostrarMensaje('Ocurrió un error al cancelar. Intenta de nuevo.', 'error');
        }
      } catch (e) {
        mostrarMensaje('Error de red al intentar cancelar.', 'error');
      }
    }

    /* ── Init ── */
    (async () => {
      await cargarUsuario();
      await cargarReservas();
    })();
  </script>

</body>
</html>
